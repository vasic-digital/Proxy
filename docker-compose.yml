#############################################
# Proxy Service - Docker Compose Configuration
#
# Services:
#   - proxy-squid: HTTP/HTTPS caching proxy
#   - proxy-dante: SOCKS5 proxy
#   - proxy-vpn: OpenVPN client (optional)
#   - proxy-admin: Web admin interface
#
# Profiles:
#   - vpn: Enables VPN routing
#   - no-vpn: Direct connection (default)
#############################################

version: "3.8"

services:
  #############################################
  # OpenVPN Client - VPN Gateway
  # Routes all proxy traffic through VPN
  #############################################
  proxy-vpn:
    image: dperson/openvpn-client:latest
    container_name: proxy-vpn
    hostname: proxy-vpn
    profiles:
      - vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ:-UTC}
      - VPNFILES=/vpn
      - FIREWALL=on
      - ROUTE_DELAY=5
      - PING=${VPN_HEALTH_INTERVAL:-30}
    volumes:
      - ${VPN_OVPN_PATH}:/vpn/config.ovpn:ro
      - ./vpn-auth.txt:/vpn/vpn.auth:ro
    read_only: false
    tmpfs:
      - /tmp
    dns:
      - ${DNS_SERVER_1:-8.8.8.8}
      - ${DNS_SERVER_2:-8.8.4.4}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "-W", "5", "8.8.8.8"]
      interval: ${VPN_HEALTH_INTERVAL:-30}s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      proxy-net:
        aliases:
          - vpn-gateway

  #############################################
  # Squid - HTTP/HTTPS Caching Proxy
  # Comprehensive caching for web content
  #############################################
  proxy-squid:
    image: ubuntu/squid:latest
    container_name: proxy-squid
    hostname: proxy-squid
    profiles:
      - vpn
      - no-vpn
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./config/squid/squid.conf:/etc/squid/squid.conf:ro
      - ${CACHE_DIR:-./cache}/squid:/var/spool/squid
      - ${LOG_DIR:-./logs}:/var/log/squid
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${HTTP_PROXY_PORT:-3128}:3128"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      proxy-net:
    depends_on:
      proxy-vpn:
        condition: service_healthy
        required: false
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  #############################################
  # Dante - SOCKS5 Proxy
  # SOCKS protocol support
  #############################################
  proxy-dante:
    image: vimagick/dante:latest
    container_name: proxy-dante
    hostname: proxy-dante
    profiles:
      - vpn
      - no-vpn
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/dante/sockd.conf:/etc/sockd.conf:ro
      - ${LOG_DIR:-./logs}:/var/log
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${SOCKS_PROXY_PORT:-1080}:1080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "sockd"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      proxy-net:
    depends_on:
      proxy-vpn:
        condition: service_healthy
        required: false
    network_mode: service:proxy-vpn

  #############################################
  # Admin Interface - Caddy Web Server
  # Provides monitoring and status page
  #############################################
  proxy-admin:
    image: ghcr.io/caddyserver/caddy:latest
    container_name: proxy-admin
    hostname: proxy-admin
    profiles:
      - vpn
      - no-vpn
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./services/admin:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${PROXY_ADMIN_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      proxy-net:

  #############################################
  # Cache Invalidator - Scheduled Cleanup
  # Periodically cleans stale cache entries
  #############################################
  cache-invalidator:
    image: alpine:latest
    container_name: proxy-cache-invalidator
    hostname: cache-invalidator
    profiles:
      - vpn
      - no-vpn
    environment:
      - TZ=${TZ:-UTC}
      - CACHE_DIR=/cache
      - CACHE_MAX_AGE_DAYS=${CACHE_MAX_AGE_DAYS:-30}
      - CACHE_MAX_SIZE_GB=${CACHE_MAX_SIZE_GB:-50}
    volumes:
      - ${CACHE_DIR:-./cache}:/cache
      - ./scripts/cache-invalidator.sh:/invalidator.sh:ro
    command: >
      sh -c "
        while true; do
          /invalidator.sh
          sleep $((CACHE_INVALIDATE_INTERVAL_HOURS:-24 * 3600))
        done
      "
    restart: unless-stopped
    networks:
      proxy-net:

  #############################################
  # VPN Monitor - Connection Watcher
  # Monitors VPN and restarts services on disconnect
  #############################################
  vpn-monitor:
    image: alpine:latest
    container_name: proxy-vpn-monitor
    hostname: vpn-monitor
    profiles:
      - vpn
    environment:
      - TZ=${TZ:-UTC}
      - VPN_AUTO_RECONNECT=${VPN_AUTO_RECONNECT:-true}
      - CACHE_INVALIDATE_ON_RECONNECT=${CACHE_INVALIDATE_ON_RECONNECT:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/vpn-monitor.sh:/monitor.sh:ro
    command: >
      sh -c "
        apk add --no-cache curl &&
        while true; do
          /monitor.sh
          sleep 30
        done
      "
    restart: unless-stopped
    networks:
      proxy-net:
    depends_on:
      - proxy-vpn

networks:
  proxy-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  caddy_data:
  caddy_config:
