#############################################
# Proxy Service - Docker Compose Configuration
#############################################

version: "3.8"

services:
  #############################################
  # OpenVPN Client - VPN Gateway
  #############################################
  proxy-vpn:
    image: docker.io/dperson/openvpn-client:latest
    container_name: proxy-vpn
    hostname: proxy-vpn
    profiles:
      - vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ:-UTC}
      - VPNFILES=/vpn
      - FIREWALL=on
      - ROUTE_DELAY=5
      - PING=${VPN_HEALTH_INTERVAL:-30}
    volumes:
      - ${VPN_OVPN_PATH}:/vpn/config.ovpn:ro
      - ./vpn-auth.txt:/vpn/vpn.auth:ro
    tmpfs:
      - /tmp
    dns:
      - ${DNS_SERVER_1:-8.8.8.8}
      - ${DNS_SERVER_2:-8.8.4.4}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "-W", "5", "8.8.8.8"]
      interval: ${VPN_HEALTH_INTERVAL:-30}s
      timeout: 10s
      retries: 3
      start_period: 30s

  #############################################
  # Squid - HTTP/HTTPS Caching Proxy
  #############################################
  
  # Squid with containerized VPN
  proxy-squid:
    image: docker.io/ubuntu/squid:latest
    container_name: proxy-squid
    hostname: proxy-squid
    profiles:
      - vpn
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/squid/squid.conf:/etc/squid/squid.conf:ro
      - ${CACHE_DIR:-./cache}/squid:/var/spool/squid
      - ${LOG_DIR:-./logs}:/var/log/squid
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 30s
      timeout: 10s
      retries: 3
    network_mode: service:proxy-vpn
    depends_on:
      proxy-vpn:
        condition: service_healthy

  # Squid with host network (routes through host's VPN if active)
  proxy-squid-host:
    image: docker.io/ubuntu/squid:latest
    container_name: proxy-squid
    hostname: proxy-squid
    profiles:
      - host-vpn
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/squid/squid.conf:/etc/squid/squid.conf:ro
      - ${CACHE_DIR:-./cache}/squid:/var/spool/squid
      - ${LOG_DIR:-./logs}:/var/log/squid
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Squid standalone (no VPN, bridge network)
  proxy-squid-standalone:
    image: docker.io/ubuntu/squid:latest
    container_name: proxy-squid
    hostname: proxy-squid
    profiles:
      - no-vpn
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/squid/squid.conf:/etc/squid/squid.conf:ro
      - ${CACHE_DIR:-./cache}/squid:/var/spool/squid
      - ${LOG_DIR:-./logs}:/var/log/squid
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${HTTP_PROXY_PORT:-3128}:3128"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 30s
      timeout: 10s
      retries: 3

  #############################################
  # Dante - SOCKS5 Proxy
  #############################################
  
  # Dante with containerized VPN
  proxy-dante:
    image: docker.io/vimagick/dante:latest
    container_name: proxy-dante
    hostname: proxy-dante
    profiles:
      - vpn
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/dante/sockd.conf:/etc/sockd.conf:ro
      - ${LOG_DIR:-./logs}:/var/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "sockd"]
      interval: 30s
      timeout: 10s
      retries: 3
    network_mode: service:proxy-vpn
    depends_on:
      proxy-vpn:
        condition: service_healthy

  # Dante with host network (routes through host's VPN if active)
  proxy-dante-host:
    image: docker.io/vimagick/dante:latest
    container_name: proxy-dante
    hostname: proxy-dante
    profiles:
      - host-vpn
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/dante/sockd.conf:/etc/sockd.conf:ro
      - ${LOG_DIR:-./logs}:/var/log
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "sockd"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dante standalone (no VPN, bridge network)
  proxy-dante-standalone:
    image: docker.io/vimagick/dante:latest
    container_name: proxy-dante
    hostname: proxy-dante
    profiles:
      - no-vpn
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/dante/sockd.conf:/etc/sockd.conf:ro
      - ${LOG_DIR:-./logs}:/var/log
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${SOCKS_PROXY_PORT:-1080}:1080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "sockd"]
      interval: 30s
      timeout: 10s
      retries: 3

  #############################################
  # Admin Interface
  #############################################
  proxy-admin:
    image: docker.io/traefik/whoami:latest
    container_name: proxy-admin
    hostname: proxy-admin
    profiles:
      - vpn
      - host-vpn
    environment:
      - TZ=${TZ:-UTC}
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${PROXY_ADMIN_PORT:-8080}:80"
    restart: unless-stopped

  #############################################
  # Cache Invalidator
  #############################################
  cache-invalidator:
    image: docker.io/alpine:latest
    container_name: proxy-cache-invalidator
    hostname: cache-invalidator
    profiles:
      - vpn
      - host-vpn
      - no-vpn
    environment:
      - TZ=${TZ:-UTC}
      - CACHE_DIR=/cache
      - CACHE_MAX_AGE_DAYS=${CACHE_MAX_AGE_DAYS:-30}
      - CACHE_MAX_SIZE_GB=${CACHE_MAX_SIZE_GB:-50}
    volumes:
      - ${CACHE_DIR:-./cache}:/cache
      - ./scripts/cache-invalidator.sh:/invalidator.sh:ro
    command: >
      sh -c "while true; do /invalidator.sh; sleep 86400; done"
    restart: unless-stopped

  #############################################
  # VPN Monitor
  #############################################
  vpn-monitor:
    image: docker.io/alpine:latest
    container_name: proxy-vpn-monitor
    hostname: vpn-monitor
    profiles:
      - vpn
    environment:
      - TZ=${TZ:-UTC}
      - VPN_AUTO_RECONNECT=${VPN_AUTO_RECONNECT:-true}
    volumes:
      - /run/podman/podman.sock:/var/run/docker.sock
      - ./scripts/vpn-monitor.sh:/monitor.sh:ro
    command: >
      sh -c "while true; do /monitor.sh; sleep 30; done"
    restart: unless-stopped
    depends_on:
      - proxy-vpn
